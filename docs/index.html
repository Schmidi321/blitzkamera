<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#04040a">
<title>⚡ Blitzkamera</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="boltGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#00e5ff"/>
        <stop offset="100%" stop-color="#7c5cff"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <div class="vignette"></div>
    <div class="grain"></div>
    <div class="flash-overlay" id="flashOverlay"></div>

    <svg id="boltStreak" class="bolt-streak" viewBox="0 0 48 64" fill="none">
      <path d="M28 0 L4 36 L20 36 L16 64 L44 24 L26 24 Z"/>
    </svg>

    <div class="placeholder" id="placeholder">
      <svg class="bolt-logo big" viewBox="0 0 48 64" fill="none">
        <path d="M28 0 L4 36 L20 36 L16 64 L44 24 L26 24 Z" fill="url(#boltGrad)"/>
      </svg>
      <p>Kamera bereit zum Start</p>
    </div>

    <header class="topbar">
      <div class="brand">
        <svg class="bolt-logo" viewBox="0 0 48 64" fill="none">
          <path d="M28 0 L4 36 L20 36 L16 64 L44 24 L26 24 Z" fill="url(#boltGrad)"/>
        </svg>
        <span>Blitzkamera</span>
      </div>
      <div class="status-pill" id="statusPill">
        <span class="status-dot" id="statusDot"></span>
        <span id="status">Bereit</span>
      </div>
    </header>

    <div class="delta-meter">
      <div class="delta-fill" id="deltaFill"></div>
    </div>

    <div class="dock">
      <button class="dock-btn" id="settingsBtn" aria-label="Einstellungen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="4" y1="6" x2="20" y2="6"/>
          <circle cx="9" cy="6" r="2" fill="currentColor" stroke="none"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <circle cx="15" cy="12" r="2" fill="currentColor" stroke="none"/>
          <line x1="4" y1="18" x2="20" y2="18"/>
          <circle cx="7" cy="18" r="2" fill="currentColor" stroke="none"/>
        </svg>
      </button>

      <button class="shutter" id="toggleBtn" aria-label="Kamera starten">
        <span class="shutter-ring"></span>
        <span class="shutter-core"></span>
      </button>

      <button class="dock-btn" id="galleryBtn" aria-label="Galerie">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
          <rect x="3" y="7" width="14" height="14" rx="2"/>
          <path d="M7 7V5a2 2 0 012-2h10a2 2 0 012 2v10a2 2 0 01-2 2h-2"/>
        </svg>
        <span class="badge" id="shotBadge" hidden>0</span>
      </button>
    </div>
  </div>

  <div class="backdrop" id="backdrop"></div>

  <div class="sheet" id="settingsSheet">
    <div class="sheet-handle"></div>
    <h2>Einstellungen</h2>
    <label class="slider-label">
      <span class="slider-row"><span>Empfindlichkeit</span><span id="sensValue">5</span></span>
      <input type="range" id="sensitivity" min="1" max="10" value="5">
    </label>
    <label class="slider-label">
      <span class="slider-row"><span>Vorlauf</span><span id="preTriggerValue">250 ms</span></span>
      <input type="range" id="preTrigger" min="0" max="800" step="50" value="250">
    </label>
    <button class="secondary-btn full" id="flipCameraBtn" style="margin-top:12px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:16px;height:16px;vertical-align:middle;margin-right:6px">
        <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
      <span id="flipLabel">Frontkamera</span>
    </button>
    <button class="secondary-btn full" id="settingsClose" style="margin-top:8px">Fertig</button>
  </div>

  <div class="sheet sheet-gallery" id="gallerySheet">
    <div class="sheet-handle"></div>
    <h2>Aufnahmen (<span id="shotCount">0</span>)</h2>

    <div class="composite-wrap" id="compositeWrap" hidden>
      <div class="composite-header">
        <span>⚡ Blitz-Komposit</span>
        <span class="composite-badge">KILLER</span>
      </div>
      <img id="compositeImg" class="composite-img" src="" alt="Blitz-Komposit">
      <div class="composite-actions">
        <a id="compositeDownload" class="primary-btn" download="blitz-komposit.jpg">Speichern</a>
        <button id="compositeShare" class="secondary-btn">Teilen</button>
      </div>
    </div>

    <div id="gallery" class="gallery-grid"></div>
    <p class="empty-gallery" id="emptyGallery">Noch keine Aufnahmen – warte auf den nächsten Blitz.</p>
  </div>

  <div class="viewer" id="modal">
    <img id="modalImg" src="" alt="Blitzfoto">
    <div class="viewer-actions">
      <a id="modalDownload" class="primary-btn" download>Speichern</a>
      <button id="modalShare" class="secondary-btn">Teilen</button>
      <button id="modalClose" class="secondary-btn">Schließen</button>
    </div>
  </div>

  <!-- ===== Splash screen ===== -->
  <div class="splash" id="splash">
    <div class="splash-bg-glow"></div>
    <div class="splash-content">
      <div class="splash-logo-wrap">
        <svg class="splash-logo-svg" viewBox="0 0 100 86" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="splashGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#00e5ff"/>
              <stop offset="100%" stop-color="#7c5cff"/>
            </linearGradient>
            <radialGradient id="splashLensGrad" cx="30%" cy="28%" r="72%">
              <stop offset="0%" stop-color="rgba(10,8,28,0.65)"/>
              <stop offset="100%" stop-color="rgba(4,4,14,0.96)"/>
            </radialGradient>
          </defs>
          <!-- Camera body -->
          <rect x="9" y="24" width="82" height="53" rx="9"
                fill="rgba(255,255,255,0.04)" stroke="url(#splashGrad)" stroke-width="1.5"/>
          <!-- Viewfinder bump -->
          <rect x="35" y="14" width="30" height="13" rx="5"
                fill="rgba(255,255,255,0.04)" stroke="url(#splashGrad)" stroke-width="1.5"/>
          <!-- Shutter button -->
          <circle cx="80" cy="31" r="4"
                  fill="rgba(255,255,255,0.07)" stroke="url(#splashGrad)" stroke-width="1"/>
          <!-- Flash indicator -->
          <rect x="14" y="29" width="10" height="6" rx="2"
                fill="rgba(255,255,255,0.07)" stroke="url(#splashGrad)" stroke-width="0.8"/>
          <!-- Status indicator dot -->
          <circle cx="25" cy="32" r="2" fill="rgba(255,255,255,0.12)"/>
          <circle cx="25" cy="32" r="1.2" fill="url(#splashGrad)" opacity="0.7"/>
          <!-- Lens outer ring -->
          <circle cx="50" cy="53" r="20" fill="none" stroke="url(#splashGrad)" stroke-width="1.5"/>
          <!-- Lens inner (dark fill) -->
          <circle cx="50" cy="53" r="14" fill="url(#splashLensGrad)"/>
          <!-- Lightning bolt inside lens -->
          <path d="M55 40 L41 54 L49 54 L45 66 L59 51 L51 51 Z" fill="url(#splashGrad)"/>
          <!-- Lens highlight arc -->
          <path d="M40 46 A11 11 0 0 1 50 41"
                stroke="rgba(255,255,255,0.28)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <h1 class="splash-title">Blitzkamera</h1>
      <p class="splash-sub">Automatische Blitzerkennung</p>
    </div>
    <div class="splash-progress">
      <div class="splash-progress-bar"></div>
    </div>
    <p class="splash-credit">von <span>AppReich</span></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
